name: Cross-platform verification

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Node 22.19 / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - name: Install without lifecycle scripts
        run: npm ci --ignore-scripts
      - name: Typecheck strict TypeScript
        run: npm run typecheck
      - name: Build distributable JavaScript
        run: npm run build
      - name: Verify catalogs and generated documentation
        run: npm run catalog:verify
      - name: Unit contracts
        run: npm run test:unit
      - name: Schema and catalog contracts
        run: npm run test:contracts
      - name: Integration flows
        run: npm run test:integration
      - name: Claude Code native adapter
        run: npm run test:runtime:claude
      - name: OpenCode native adapter
        run: npm run test:runtime:opencode
      - name: Codex native adapter
        run: npm run test:runtime:codex
      - name: Compatibility and security harness
        run: npm run test:harness
      - name: Packed artifact
        run: npm run package:verify
      - name: Patch hygiene
        run: git diff --check "${{ github.event.pull_request.base.sha || github.event.before }}" HEAD
